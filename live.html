<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANDIDDD — Live Adesso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #0a0a0a; 
      color: #fff; 
      min-height: 100vh;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: linear-gradient(135deg, #1a2f2f 0%, #0f1f1f 100%);
      border-bottom: 2px solid #00ff88;
    }
    .logo { 
      font-size: 24px; 
      font-weight: bold; 
      color: #ccff00;
      letter-spacing: 2px;
    }
    .btn-live {
      background: #ccff00;
      color: #000;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }
    .btn-live:hover { transform: scale(1.05); }
    .dot { 
      width: 10px; 
      height: 10px; 
      background: #ff0000; 
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    main {
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      margin-bottom: 40px;
    }
    #live-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .live-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      border: 2px solid #2a2a4e;
      transition: all 0.3s;
      cursor: pointer;
    }
    .live-card:hover {
      border-color: #00ff88;
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 255, 136, 0.2);
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ff0000;
      color: #fff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }
    .level-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #00ff88;
      color: #000;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-top: 20px;
    }
    .viewer-count {
      color: #00ff88;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .viewer-count::before {
      content: "👁";
    }
    .creator-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #fff;
    }
    .creator-city {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
